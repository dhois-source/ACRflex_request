<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACRflex Direktabfrage</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            background-color: #1a1a1a;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 20px 20px;
            color: #e8e8e8;
            min-height: 100vh;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: #ef4b23;
        }
        .logo {
            text-align: left;
            margin-bottom: 6px;
        }
        .logo img {
            height: 45px;
            width: auto;
        }
        .slogan {
            font-size: 10px;
            color: #ef4b23;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 600;
        }
        h1 {
            color: #fff;
            margin: 0 0 4px 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .highlight {
            color: #ef4b23;
        }
        .subtitle {
            color: #999;
            font-size: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .panel {
            background-color: rgba(30, 30, 30, 0.7);
            border-radius: 8px;
            padding: 24px;
            border: 1px solid #2d2d2d;
        }
        label {
            display: block;
            margin: 16px 0 6px 0;
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            background-color: #252525;
            color: #f0f0f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #ef4b23;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .btn:hover { opacity: 0.85; }
        .btn-query { background-color: #ef4b23; color: #fff; }
        #status {
            margin-top: 14px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .ok { background-color: rgba(76, 175, 80, 0.12); color: #6dd173; display: block !important; border: 1px solid rgba(76, 175, 80, 0.25); }
        .err { background-color: rgba(239, 75, 35, 0.12); color: #ff7a66; display: block !important; border: 1px solid rgba(239, 75, 35, 0.3); }
        .info {
            background-color: rgba(30, 30, 30, 0.7);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
            border: 1px solid #2d2d2d;
        }
        .info strong { color: #ccc; }
        .descr {
            font-size: 11px;
            color: #555;
            margin-top: 3px;
        }
        .history {
            margin-top: 24px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .history-title {
            font-size: 11px;
            color: #ef4b23;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .history-clear {
            font-size: 11px;
            color: #666;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-transform: lowercase;
        }
        .history-clear:hover { color: #ef4b23; }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .history-item {
            background-color: rgba(30, 30, 30, 0.7);
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .history-item:hover {
            border-color: #3a3a3a;
        }
        .history-item-text {
            font-size: 13px;
            color: #ccc;
        }
        .history-item-date {
            font-size: 10px;
            color: #666;
            white-space: nowrap;
            margin-left: 10px;
        }
        .history-empty {
            font-size: 12px;
            color: #555;
            text-align: center;
            padding: 16px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="ZF-Lifetech_Logo_Black_Dotted_Background_Small.jpg" alt="ZF Lifetech Logo">
    </div>
    <div class="slogan">Pioneering Automotive Safety</div>

    <h1>ACRflex<br><span class="highlight">Direktabfrage</span></h1>
    <div class="subtitle">Aktuellster DB-Status</div>

    <div class="info">
        1. <strong>ACRflex_status_receiver.py</strong> starten<br>
        2. Daten eingeben und <strong>Abfragen</strong> klicken<br>
        3. Ergebnis kommt als Push auf <strong>ntfy.sh/ACRflex-status</strong>
    </div>

    <div class="panel">
        <label for="typ">Nummerntyp</label>
        <select id="typ" onchange="toggleTS()">
            <option value="TAVA">TAVA</option>
            <option value="COP">COP</option>
        </select>

        <label for="nummer">Nummer</label>
        <input type="text" id="nummer" placeholder="z. B. 12345">

        <label for="testserie">Testserie</label>
        <input type="text" id="testserie" placeholder="z. B. 01 (bei TAVA erforderlich)">

        <label for="teilenummern">Teilenummern (kommagetrennt)</label>
        <input type="text" id="teilenummern" placeholder="001, 002, 003">

        <button class="btn btn-query" onclick="send()">Abfragen</button>
        <div id="status"></div>
    </div>

    <div class="history" id="historySection" style="display: none;">
        <div class="history-header">
            <span class="history-title">Letzte Abfragen</span>
            <button class="history-clear" onclick="clearHistory()">Alle löschen</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
    </div>

    <script>
        const TOPIC = 'ACRflex-Control';
        const HISTORY_KEY = 'acr_history';
        const MAX_HISTORY = 5;

        function toggleTS() {
            const ts = document.getElementById('testserie');
            ts.disabled = document.getElementById('typ').value === 'COP';
            ts.style.opacity = ts.disabled ? '0.4' : '1';
        }

        function show(msg, err) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = err ? 'err' : 'ok';
            setTimeout(() => { el.className = ''; }, 5000);
        }

        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            } catch { return []; }
        }

        function saveHistory(items) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
        }

        function formatDate(d) {
            const t = new Date(d);
            return t.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const section = document.getElementById('historySection');
            const items = loadHistory();
            if (items.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            list.innerHTML = items.map((item, idx) =>
                `<li class="history-item" onclick="restoreHistory(${idx})">
                    <span class="history-item-text">${escapeHtml(item.typ)} | ${escapeHtml(item.nummer)} | ${escapeHtml(item.teilenummern)}</span>
                    <span class="history-item-date">${formatDate(item.date)}</span>
                </li>`
            ).join('');
        }

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function addToHistory(entry) {
            let items = loadHistory();
            items = items.filter(i => !(i.typ === entry.typ && i.nummer === entry.nummer && i.teilenummern === entry.teilenummern && i.testserie === entry.testserie));
            items.unshift(entry);
            if (items.length > MAX_HISTORY) items = items.slice(0, MAX_HISTORY);
            saveHistory(items);
            renderHistory();
        }

        function restoreHistory(idx) {
            const items = loadHistory();
            if (!items[idx]) return;
            const item = items[idx];
            document.getElementById('typ').value = item.typ;
            document.getElementById('nummer').value = item.nummer;
            document.getElementById('teilenummern').value = item.teilenummern;
            document.getElementById('testserie').value = item.testserie;
            toggleTS();
        }

        function clearHistory() {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }

        async function send() {
            const typ = document.getElementById('typ').value;
            const nummer = document.getElementById('nummer').value.trim();
            const testserie = document.getElementById('testserie').value.trim();
            const teilenummern = document.getElementById('teilenummern').value.trim();

            if (!nummer) { show('Nummer eingeben!', true); return; }
            if (!teilenummern) { show('Teilenummern eingeben!', true); return; }

            addToHistory({ typ, nummer, teilenummern, testserie, date: new Date().toISOString() });

            const payload = { action: 'QUERY', typ, nummer, teilenummern, testserie };

            try {
                const r = await fetch('https://ntfy.sh/' + TOPIC, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Title': 'Status-Abfrage', 'Priority': '4' }
                });
                show(r.ok ? 'Abfrage gesendet. Ergebnis kommt als Push.' : 'Fehler: HTTP ' + r.status, !r.ok);
            } catch (e) {
                show('Netzwerkfehler: ' + e.message, true);
            }
        }

        toggleTS();
        renderHistory();
    </script>
</body>
</html>
